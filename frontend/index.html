<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Moedas</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="scene">
    <section class="window">
      <header class="titlebar">
        <div class="titlebar__app">
          <span class="app-dot" aria-hidden="true"></span>
          <p>Conversor de Moedas</p>
        </div>
        <div class="window-actions" aria-hidden="true">
          <span></span>
          <span></span>
          <span class="close"></span>
        </div>
      </header>

      <div class="window-content">
        <form class="converter card rise delay-1" action="#" method="get">
          <label for="from">Moeda de origem</label>
          <select id="from" name="from">
            <option>USD</option>
            <option>BRL</option>
            <option>EUR</option>
            <option>JPY</option>
          </select>

          <label for="to">Moeda de destino</label>
          <select id="to" name="to">
            <option>BRL</option>
            <option>USD</option>
            <option>EUR</option>
            <option>JPY</option>
          </select>

          <label for="amount">Valor</label>
          <input id="amount" name="amount" type="number" step="0.01" placeholder="100.00" />

          <button type="button">Converter</button>
        </form>

        <section class="result card rise delay-2" aria-live="polite">
          <p class="result-label">Resultado</p>
          <p class="result-value">--</p>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
